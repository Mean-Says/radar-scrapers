name: Brazil Scrapers (Indeed + Boards)

on:
  schedule:
    - cron: "*/30 * * * *"   # a cada 30 minutos
  workflow_dispatch:           # permite rodar manualmente

jobs:
  indeed:
    name: Indeed BR
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar scraper Indeed
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
        run: python runner.py indeed

  brazil_boards:
    name: TrabalhaBrasil + Vagas.com
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar scrapers BR Boards
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
        run: python runner.py brazil_boards
